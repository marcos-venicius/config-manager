[window]
padding = { x = 1, y = 1 }
decorations = "None"
dynamic_title = false

[font]
normal = { family = "JetBrainsMonoNerdFont" }
size = 9

[mouse]
hide_when_typing = true

[colors.primary]
background = "#141414"
foreground = "#d3c6aa"

[colors.normal]
black   = "#414b50"
red     = "#e67e80"
green   = "#a7c080"
yellow  = "#dbbc7f"
blue    = "#7fbbb3"
magenta = "#d699b6"
cyan    = "#83c092"
white   = "#d3c6aa"

[colors.bright]
black   = "#475258"
red     = "#e67e80"
green   = "#a7c080"
yellow  = "#dbbc7f"
blue    = "#7fbbb3"
magenta = "#d699b6"
cyan    = "#83c092"
white   = "#d3c6aa"

[env]
TERM = "alacritty"
